openapi: 3.0.3
info:
  title: Monimmo Assistant API
  version: 0.1.0
  description: API REST spec-first pour assistant IA agent immobilier.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Auth
  - name: Search
  - name: Users
  - name: Properties
  - name: Visits
  - name: Files
  - name: Messages
  - name: Vocals
  - name: ReviewQueue
  - name: Integrations
  - name: Privacy
  - name: Assistant
  - name: Links
paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      responses:
        "200":
          description: Service en ligne.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/login:
    post:
      tags: [Auth]
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentification réussie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Identifiants invalides.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Trop de tentatives.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: postAuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens régénérés.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Refresh token invalide.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      tags: [Auth]
      operationId: postAuthLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Déconnecté.
  /me:
    get:
      tags: [Auth]
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Utilisateur courant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me/settings:
    get:
      tags: [Auth]
      operationId: getMeSettings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paramètres applicatifs de l'utilisateur courant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettingsResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Auth]
      operationId: patchMeSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettingsPatchRequest"
      responses:
        "200":
          description: Paramètres applicatifs mis à jour.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettingsResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me/ai-calls:
    get:
      tags: [Auth]
      operationId: getMeAICalls
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Historique des appels IA de l'organisation courante.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AICallLogListResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /privacy/exports:
    post:
      tags: [Privacy]
      operationId: postPrivacyExports
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivacyExportRequest"
      responses:
        "202":
          description: Export RGPD demandé.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyExportResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Rôle insuffisant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /privacy/exports/{id}:
    get:
      tags: [Privacy]
      operationId: getPrivacyExportById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: État export RGPD.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyExportResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Rôle insuffisant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Export introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /privacy/erase:
    post:
      tags: [Privacy]
      operationId: postPrivacyErase
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivacyEraseRequest"
      responses:
        "202":
          description: Effacement RGPD demandé.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyEraseResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Rôle insuffisant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search:
    get:
      tags: [Search]
      operationId: getSearch
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Résultats de recherche globaux multi-objets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalSearchResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /data-structure/lien:
    get:
      tags: [Assistant]
      operationId: getLinkTypeDefinitions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Catalogue des types de liens et de leurs paramètres.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkTypeDefinitionListResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /data-structure/lien/{typeLien}:
    get:
      tags: [Assistant]
      operationId: getLinkDataStructureByType
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: typeLien
          required: true
          schema:
            $ref: "#/components/schemas/LinkType"
      responses:
        "200":
          description: Structure des paramètres pour un type de lien.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkTypeDefinition"
        "404":
          description: Type de lien introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /data-structure/{objectType}:
    get:
      tags: [Assistant]
      operationId: getObjectDataStructureByType
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: objectType
          required: true
          schema:
            type: string
            enum: [bien, user, rdv, visite]
      responses:
        "200":
          description: Structure des paramètres pour un type d'objet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectDataStructureResponse"
        "400":
          description: Type d'objet invalide.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /links:
    get:
      tags: [Links]
      operationId: getLinks
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
        - in: query
          name: typeLien
          required: false
          schema:
            $ref: "#/components/schemas/LinkType"
        - in: query
          name: objectId
          required: false
          schema:
            type: string
        - in: query
          name: objectId1
          required: false
          schema:
            type: string
        - in: query
          name: objectId2
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Liste des liens business.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkListResponse"
    post:
      tags: [Links]
      operationId: postLinks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkCreateRequest"
      responses:
        "201":
          description: Lien créé.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "200":
          description: Lien déjà existant mis à jour (upsert).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
  /links/{id}:
    get:
      tags: [Links]
      operationId: getLinkById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Détail d'un lien.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "404":
          description: Lien introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Links]
      operationId: patchLinkById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkPatchRequest"
      responses:
        "200":
          description: Lien mis à jour.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "404":
          description: Lien introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Links]
      operationId: deleteLinkById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Lien supprimé.
        "404":
          description: Lien introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /links/related/{objectType}/{objectId}:
    get:
      tags: [Links]
      operationId: getRelatedLinks
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: objectType
          required: true
          schema:
            $ref: "#/components/schemas/LinkObjectType"
        - in: path
          name: objectId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Liens et objets liés hydratés pour un objet source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkRelatedResponse"
        "400":
          description: Type d'objet invalide.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Objet source introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assistant/conversation:
    get:
      tags: [Assistant]
      operationId: getAssistantConversation
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversation assistant courante (persistante, reset manuel).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantConversationResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assistant/conversation/reset:
    post:
      tags: [Assistant]
      operationId: postAssistantConversationReset
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversation assistant réinitialisée.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantConversationResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assistant/messages:
    post:
      tags: [Assistant]
      operationId: postAssistantMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantMessageCreateRequest"
      responses:
        "200":
          description: Message utilisateur traité et réponse assistant produite.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantMessageCreateResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assistant/messages/stream:
    post:
      tags: [Assistant]
      operationId: postAssistantMessageStream
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantMessageCreateRequest"
      responses:
        "200":
          description: Flux SSE de la réponse assistant (delta + final).
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /object-changes/{objectType}/{objectId}:
    get:
      tags: [Assistant]
      operationId: getObjectChangeHistory
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: objectType
          required: true
          schema:
            $ref: "#/components/schemas/AssistantObjectType"
        - in: path
          name: objectId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Historique des modifications pour un objet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObjectChangeListResponse"
        "400":
          description: Type d'objet invalide.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users:
    get:
      tags: [Users]
      operationId: getUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: accountType
          required: false
          schema:
            $ref: "#/components/schemas/AccountType"
      responses:
        "200":
          description: Liste des utilisateurs du compte.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUserListResponse"
    post:
      tags: [Users]
      operationId: postUsers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: Utilisateur créé.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUserDetailResponse"
  /users/{id}:
    get:
      tags: [Users]
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Détail utilisateur.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUserDetailResponse"
    patch:
      tags: [Users]
      operationId: patchUserById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatchRequest"
      responses:
        "200":
          description: Utilisateur mis à jour.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUserDetailResponse"
        "404":
          description: Utilisateur introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/register:
    post:
      tags: [Auth]
      operationId: postAuthRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Compte créé.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Données invalides.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: postAuthForgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "202":
          description: Demande acceptée.
        "429":
          description: Trop de tentatives.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: postAuthResetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "204":
          description: Mot de passe modifié.
        "400":
          description: Token invalide.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Trop de tentatives.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /properties:
    get:
      tags: [Properties]
      operationId: getProperties
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Liste des biens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyListResponse"
    post:
      tags: [Properties]
      operationId: postProperties
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyCreateRequest"
      responses:
        "201":
          description: Bien créé.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"
  /properties/{id}:
    get:
      tags: [Properties]
      operationId: getPropertyById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Détail du bien.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"
        "404":
          description: Bien introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Properties]
      operationId: patchPropertyById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyPatchRequest"
      responses:
        "200":
          description: Bien mis à jour.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"
  /properties/{id}/status:
    patch:
      tags: [Properties]
      operationId: patchPropertyStatusById
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyStatusUpdateRequest"
      responses:
        "200":
          description: Statut du bien mis à jour.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"
  /properties/{id}/visits:
    get:
      tags: [Visits]
      operationId: getPropertyVisits
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Liste des visites du bien.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyVisitListResponse"
    post:
      tags: [Visits]
      operationId: postPropertyVisits
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyVisitCreateRequest"
      responses:
        "201":
          description: Visite ajoutée.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyVisitResponse"
  /properties/{id}/risks:
    get:
      tags: [Properties]
      operationId: getPropertyRisks
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Risques geographiques recuperes depuis Georisques.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyRiskResponse"
        "404":
          description: Bien introuvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /properties/{id}/comparables:
    get:
      tags: [Properties]
      operationId: getPropertyComparables
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - in: query
          name: propertyType
          required: false
          schema:
            $ref: "#/components/schemas/ComparablePropertyType"
        - in: query
          name: forceRefresh
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Ventes comparables DVF pour le bien.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyComparablesResponse"
        "400":
          description: Paramètres invalides.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Bien introuvable.
          content:
