components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    CursorParam:
      name: cursor
      in: query
      required: false
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          nullable: true
    UserResponse:
      type: object
      required: [id, email, firstName, lastName, orgId, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        orgId:
          type: string
        role:
          type: string
          enum: [AGENT, MANAGER, ADMIN]
        createdAt:
          type: string
          format: date-time
    AccountType:
      type: string
      enum: [AGENT, CLIENT, NOTAIRE]
    AccountUserResponse:
      type: object
      required:
        [id, email, firstName, lastName, orgId, accountType, role, phone, address, postalCode, city, personalNotes, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        orgId:
          type: string
        accountType:
          $ref: "#/components/schemas/AccountType"
        role:
          type: string
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        personalNotes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AccountUserLinkedPropertyResponse:
      type: object
      required: [propertyId, title, city, postalCode, status, relationRole, source]
      properties:
        propertyId:
          type: string
        title:
          type: string
        city:
          type: string
        postalCode:
          type: string
        status:
          type: string
        relationRole:
          type: string
        source:
          type: string
          enum: [BUSINESS_LINK]
    AccountUserDetailResponse:
      allOf:
        - $ref: "#/components/schemas/AccountUserResponse"
        - type: object
          required: [linkedProperties]
          properties:
            linkedProperties:
              type: array
              items:
                $ref: "#/components/schemas/AccountUserLinkedPropertyResponse"
    AccountUserListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AccountUserDetailResponse"
        nextCursor:
          type: string
          nullable: true
    UserCreateRequest:
      type: object
      anyOf:
        - required: [email]
        - required: [phone]
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        personalNotes:
          type: string
          nullable: true
        accountType:
          $ref: "#/components/schemas/AccountType"
    UserPatchRequest:
      type: object
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        personalNotes:
          type: string
          nullable: true
        accountType:
          $ref: "#/components/schemas/AccountType"
    MeResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
    AppSettingsResponse:
      type: object
      required: [notaryFeePct, aiProvider, valuationAiOutputFormat, assistantSoul]
      properties:
        notaryFeePct:
          type: number
          minimum: 0
          maximum: 100
        aiProvider:
          type: string
          enum: [openai, anthropic]
          description: Provider IA global (partagé par toutes les organisations).
        valuationAiOutputFormat:
          type: string
          description: Format Markdown attendu pour la clé justification de la valorisation IA.
        assistantSoul:
          type: string
          description: Persona système injectée au début de chaque conversation assistant.
    AppSettingsPatchRequest:
      type: object
      properties:
        notaryFeePct:
          type: number
          minimum: 0
          maximum: 100
        aiProvider:
          type: string
          enum: [openai, anthropic]
        valuationAiOutputFormat:
          type: string
          nullable: true
          description: Null ou chaîne vide pour revenir au format par défaut.
        assistantSoul:
          type: string
          nullable: true
          description: Null ou chaîne vide pour revenir à la soul par défaut.
      anyOf:
        - required: [notaryFeePct]
        - required: [aiProvider]
        - required: [valuationAiOutputFormat]
        - required: [assistantSoul]
    AICallLogResponse:
      type: object
      required:
        - id
        - datetime
        - orgId
        - useCase
        - prompt
        - textResponse
        - price
        - inputTokens
        - outputTokens
        - totalTokens
        - redactionVersion
        - expiresAt
      properties:
        id:
          type: string
        datetime:
          type: string
          format: date-time
        orgId:
          type: string
        useCase:
          type: string
        prompt:
          type: string
        textResponse:
          type: string
        price:
          type: number
          minimum: 0
        inputTokens:
          type: integer
          nullable: true
        outputTokens:
          type: integer
          nullable: true
        totalTokens:
          type: integer
          nullable: true
        redactionVersion:
          type: string
        expiresAt:
          type: string
          format: date-time
    AICallLogListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AICallLogResponse"
    GlobalSearchItemType:
      type: string
      enum: [PROPERTY, USER, VOCAL, VISIT]
    GlobalSearchItemResponse:
      type: object
      required: [type, id, label, subtitle, route]
      properties:
        type:
          $ref: "#/components/schemas/GlobalSearchItemType"
        id:
          type: string
        label:
          type: string
        subtitle:
          type: string
        route:
          type: string
    GlobalSearchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GlobalSearchItemResponse"
    AssistantObjectType:
      type: string
      enum: [bien, user, rdv, visite, lien]
    AssistantCitationResponse:
      type: object
      required: [title, url, snippet]
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        snippet:
          type: string
    AssistantMessageResponse:
      type: object
      required: [id, role, text, citations, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [USER, ASSISTANT]
        text:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/AssistantCitationResponse"
        createdAt:
          type: string
          format: date-time
    AssistantConversationResponse:
      type: object
      required: [id, greeting, messages, createdAt, updatedAt]
      properties:
        id:
          type: string
        greeting:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AssistantMessageResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AssistantMessageContextRequest:
      type: object
      required: [objectType, objectId]
      properties:
        objectType:
          $ref: "#/components/schemas/AssistantObjectType"
        objectId:
          type: string
          minLength: 1
